<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplicativo para impressão de etiquetas - Espaço Vista" />
    <title>Espaço Vista - Impressão de Etiquetas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/web/css/style.css" />
    <link rel="icon" href="/web/img/Logo_V.png" type="image/png" />
</head>
<body class="bg-[var(--bg-primary)] min-h-screen flex flex-col font-sans">

<header class="w-full bg-[var(--bg-header)] text-[var(--text-header)] py-3 flex justify-center items-center shadow-md">
    <img src="/web/img/LOGO-ESPACO-VISTA1.png" alt="Logo Espaço Vista" class="h-12 sm:h-14" />
</header>

<main class="w-full max-w-2xl mx-auto px-4 flex-grow flex flex-col mt-6">
    <div class="flex flex-col gap-4 h-full">
        <section class="bg-[var(--bg-content)] rounded-lg shadow-lg p-6 flex flex-col h-full">

            <div class="mb-6">
                <label class="block text-sm font-bold text-[var(--text-primary)] mb-3">O QUE VOCÊ DESEJA IMPRIMIR?</label>
                <div class="flex gap-2 flex-wrap">
                    <button id="btnModeSimple" class="btn-primary flex-1 py-3 border-b-4 border-blue-800">COLABORADORES</button>
                    <button id="btnModeValidity" class="btn-secondary flex-1 py-3">VALIDADE</button>
                    <button id="btnModeImmediate" class="btn-accent flex-1 py-3">CONSUMO IMEDIATO</button>
                </div>
            </div>

            <div id="simpleForm" class="flex flex-col gap-4">
                <div class="relative">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Colaborador</label>
                    <input type="text" id="labelText" list="colaboradoresAtivos"
                           class="w-full border border-gray-300 rounded-md shadow-sm text-lg p-3 focus:ring-2 focus:ring-blue-500 uppercase"
                           placeholder="Busque pelo nome..." oninput="atualizarSetorAutomatico()">

                    <datalist id="colaboradoresAtivos"></datalist>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Setor / Cargo</label>
                    <input type="text" id="labelSector" readonly
                           class="w-full border border-gray-200 rounded-md bg-gray-100 p-3 text-blue-800 font-bold"
                           placeholder="Setor aparecerá aqui...">
                </div>
            </div>

            <div id="validityForm" class="hidden"></div>
            <div id="immediateForm" class="hidden"></div>

            <hr class="my-6">

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="labelQuantity" class="block text-sm font-medium text-gray-700 mb-1">Qtd. Etiquetas</label>
                    <input id="labelQuantity" type="number" min="1" value="1" class="w-full border border-gray-300 rounded-md p-3 text-center text-lg" />
                </div>
                <div>
                    <label for="labelType" class="block text-sm font-medium text-gray-700 mb-1">Tamanho</label>
                    <select id="labelType" class="w-full border border-gray-300 rounded-md p-3">
                        <option value="SIXTY_TWO_MM">Padrão (80mm x 25mm)</option>
                        <option value="STANDARD">Dupla (40mm x 25mm)</option>
                    </select>
                </div>
            </div>

            <div class="mt-8">
                <button id="printButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg flex items-center justify-center gap-2 text-xl transition-all active:scale-95">
                    <span id="printButtonText">IMPRIMIR AGORA</span>
                </button>
            </div>
        </section>
    </div>
</main>

<footer class="w-full bg-[var(--bg-header)] text-[var(--text-header)] py-4 text-center mt-6">
    <p>&copy; 2026 Espaço Vista. Gestão IT: Eduardo Melo</p>
</footer>

<script>
        // 1. DATABASE COMPLETO
        const bancoDeDadosVista = {
            "ADELYANE CRISTINA DO NASCIMENTO": "EXPEDIÇÃO",
            "ALINE CARDOSO DA SILVA": "EXPEDIÇÃO",
            "ANA CLARA DE AGUIAR RODRIGUES": "EXPEDIÇÃO",
            "ANA CLARA DE JESUS": "EXPEDIÇÃO",
            "ANA LUÍZA SILVEIRA DE SOUZA OLIVEIRA": "EXPEDIÇÃO",
            "ANDERSON HENRIQUE MUNIZ": "COZINHA",
            "ANDERSON SEIXAS FIALHO": "ESPAÇO VISTA",
            "ANDRÉA FERREIRA DE SOUSA RIBEIRO": "RH",
            "ANTÔNIO MARCOS DA SILVA TEIXEIRA": "COZINHA",
            "ARTHUR GOUVEIA CAMPOS BORGES": "RESTAURANTE",
            "ARTUR HENRIQUE SANTOS OLIVEIRA": "COZINHA",
            "BRUNO LEONARDO LOPES DOS SANTOS": "ESPAÇO VISTA",
            "CAROLAINE MARIA LIMA DE LIMA": "COZINHA",
            "CAROLLYNE VITÓRIA CORDEIRO": "EXPEDIÇÃO",

            "DERIVAL MACEDO": "COZINHA",
            "EDUARDA ESTEFANY ALVES MARTINS SILVA": "CONFEITARIA",
            "EDUARDO MARTINS PIRES": "COZINHA",
            "FABRÍCIO FRANCISCO DA SILVA": "EVENTOS",
            "GABRIELLE LICCIARDI RODRIGUES": "EXPEDIÇÃO",
            "GEOVAN FERREIRA CAMPOS": "COZINHA",

            "JOÃO MARCOS SILVA E SOUZA": "COZINHA",
            "JOSÉ CARLOS JUNIO RIBEIRO ALVES": "EXPEDIÇÃO",
            "KEROLAYNE KELLY JUNIA FERNANDES SANTANA": "EXPEDIÇÃO",
            "LARISSA FIDELES FORTUNATO": "ESTOQUE",

            "NEIDELENE ALMEIDA": "EVENTOS",

            "PEDRO HENRIQUE BARROS LIMA": "RESTAURANTE",
            "PRISCILLA STEPHANIE GUIMARÃES": "PRODUÇÃO",
            "RAFAEL OLIVEIRA SANTOS": "RESTAURANTE",
            "RENATA ALMEIDA SILVA": "COZINHA",
            "RODOLFO EDUARDO DOS SANTOS MELO": "COZINHA",
            "RONILDA MARIA DONATO": "EVENTOS",
            "SIRLEY DA SILVA": "COZINHA",
            "TAINÁ LUIZA MIRANDA DE JESUS": "EXPEDIÇÃO",
            "TALIA LUIZ DOS SANTOS": "COZINHA",
            "TAYNARA ALESSANDRA DO NASCIMENTO": "COZINHA",
            "VANDERLEI VENCESLAU": "COZINHA",
            "WILLIAM DE OLIVEIRA SILVA": "T.I."
        };

        // 2. FUNÇÃO PARA POPULAR A LISTA (CORRIGIDA)
        function carregarDatalist() {
        const list = document.getElementById('colaboradoresAtivos');
        if (!list) return;
        list.innerHTML = ""; // Limpa antes de carregar
        Object.keys(bancoDeDadosVista).sort().forEach(nome => {
            const opt = document.createElement('option');
            opt.value = nome;
            list.appendChild(opt);
        });
        console.log("Lista de colaboradores carregada: " + Object.keys(bancoDeDadosVista).length + " nomes.");
    }

    // Inicializa a lista
    window.addEventListener('load', carregarDatalist);

    // 3. LOGICA DE BUSCA E SETOR
    function atualizarSetorAutomatico() {
        const input = document.getElementById('labelText');
        const campoSetor = document.getElementById('labelSector');
        const nomeSelecionado = input.value.trim().toUpperCase();

        const setor = bancoDeDadosVista[nomeSelecionado];

        if (setor) {
            campoSetor.value = setor;

            // Lógica de encurtamento para a etiqueta
            const partes = nomeSelecionado.split(' ');
            const primeiro = partes[0];
            const repetidos = Object.keys(bancoDeDadosVista).filter(n => n.startsWith(primeiro));

            if (repetidos.length > 1) {
                input.value = primeiro + (partes[1] ? " " + partes[1] : "");
            } else {
                input.value = primeiro;
            }
        }
    }

    // Vincula o evento oninput ao campo
    document.getElementById('labelText').addEventListener('input', atualizarSetorAutomatico);
</script>

<script type="module" src="/web/script/main.js"></script>

</body>
</html>
